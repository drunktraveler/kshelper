<style>
    body { font-family: 'Inter', sans-serif; background-color: #080a0f; color: #f8fafc; }
    .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
    .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.4rem 0.75rem; width: 100%; outline: none; transition: all 0.2s; font-size: 0.9rem; text-align: center; }
    .f-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: #1e293b; }
    .f-inf { background: #3b82f6; transition: width 0.4s; }
    .f-cav { background: #f59e0b; transition: width 0.4s; }
    .f-arc { background: #10b981; transition: width 0.4s; }
    
    .hero-circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #1e293b; background: #0f172a; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: #475569; transition: 0.2s; position: relative; overflow: hidden; }
    .hero-circle.active { border-color: #3b82f6; background: #1e293b; color: white; }
    .hero-leader { border-color: rgba(245, 158, 11, 0.4); }
    
    /* THE FIX FOR THE STAT TABLE ALIGNMENT */
    .stat-row { 
        display: grid; 
        grid-template-cols: 1fr 1.5fr 1fr; 
        align-items: center; 
        height: 40px; 
        padding: 0 20px;
    }
    .stat-row input { 
        background: transparent; 
        border: none; 
        outline: none; 
        font-size: 14px; 
        font-weight: 800; 
        width: 100%;
        margin: 0;
        padding: 0;
        height: 100%; /* Ensure input takes full height of row for alignment */
    }
    .stat-row .category-label { 
        font-size: 10px; 
        font-weight: 900; 
        color: #64748b; 
        text-align: center; 
        text-transform: uppercase; 
        white-space: nowrap;
        pointer-events: none;
    }

    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
