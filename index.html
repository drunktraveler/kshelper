<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080a0f; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.4rem 0.75rem; width: 100%; outline: none; transition: all 0.2s; font-size: 0.9rem; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        .f-bar { height: 6px; border-radius: 3px; overflow: hidden; display: flex; background: #1e293b; }
        .f-inf { background: #3b82f6; transition: width 0.4s; }
        .f-cav { background: #f59e0b; transition: width 0.4s; }
        .f-arc { background: #10b981; transition: width 0.4s; }
        .hero-circle { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #1e293b; background: #0f172a; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; font-weight: bold; color: #475569; }
        .hero-circle.active { border-color: #3b82f6; background: #1e293b; color: white; }
        .hero-leader { border-color: rgba(245, 158, 11, 0.3); }
        .stat-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; text-align: center; }
        .val-higher { color: #10b981 !important; }
        .val-lower { color: #ef4444 !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <h1 class="text-xl font-black tracking-tighter text-blue-500 uppercase">Kingshot <span class="text-white font-light">Studio</span></h1>
            <nav class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button class="px-6 py-2 bg-blue-600 rounded-lg text-sm font-bold">Combat</button>
                <button class="px-6 py-2 text-slate-500 text-sm">Formation</button>
                <button class="px-6 py-2 text-slate-500 text-sm">Trap</button>
            </nav>
        </header>

        <!-- Command Cards -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Attacker Card -->
            <div class="glass-card p-6 border-l-4 border-emerald-500/30">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">Attacker Command</span>
                    <div class="flex gap-2">
                        <select id="atk-tier" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none"><option value="11">T11</option><option value="10" selected>T10</option></select>
                        <select id="atk-tg" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none"><option value="5">TG5</option><option value="3" selected>TG3</option></select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <input type="number" id="atk-inf" oninput="updateFormation('atk')" class="input-dark font-bold" value="500000">
                    <input type="number" id="atk-cav" oninput="updateFormation('atk')" class="input-dark font-bold" value="200000">
                    <input type="number" id="atk-arc" oninput="updateFormation('atk')" class="input-dark font-bold" value="300000">
                </div>
                <div class="f-bar mb-6" id="atk-f-bar">
                    <div class="f-inf" style="width: 50%"></div><div class="f-cav" style="width: 20%"></div><div class="f-arc" style="width: 30%"></div>
                </div>
                <div class="flex gap-2" id="atk-hero-grid"></div>
            </div>

            <!-- Defender Card -->
            <div class="glass-card p-6 border-r-4 border-red-500/30">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-red-500 tracking-widest">Defender Command</span>
                    <div class="flex gap-2">
                        <select id="def-tier" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none"><option value="11">T11</option><option value="10" selected>T10</option></select>
                        <select id="def-tg" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none"><option value="5">TG5</option><option value="3" selected>TG3</option></select>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <input type="number" id="def-inf" oninput="updateFormation('def')" class="input-dark font-bold" value="500000">
                    <input type="number" id="def-cav" oninput="updateFormation('def')" class="input-dark font-bold" value="200000">
                    <input type="number" id="def-arc" oninput="updateFormation('def')" class="input-dark font-bold" value="300000">
                </div>
                <div class="f-bar mb-6" id="def-f-bar">
                    <div class="f-inf" style="width: 50%"></div><div class="f-cav" style="width: 20%"></div><div class="f-arc" style="width: 30%"></div>
                </div>
                <div class="flex gap-2" id="def-hero-grid"></div>
            </div>
        </div>

        <!-- STAT BONUS INTERFACE -->
        <div class="glass-card overflow-hidden">
            <div class="grid grid-cols-3 bg-slate-900/80 py-3 px-6 border-b border-slate-800">
                <span class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">Attacker %</span>
                <span class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest">Stat Category</span>
                <span class="text-right text-[10px] font-black uppercase text-red-500 tracking-widest">Defender %</span>
            </div>
            <div class="p-2 space-y-1" id="stat-table">
                <!-- Stat rows will be injected by JS for Inf, Cav, Arc x Att, Def, Leth, HP -->
            </div>
        </div>

        <button class="w-full mt-10 bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl transition-all">RUN SIMULATION</button>
    </div>

    <!-- MODAL -->
    <div id="heroModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div id="modalContent" class="bg-slate-900 w-full max-w-sm rounded-3xl p-8 border border-slate-800 relative">
            <h3 id="modalTitle" class="text-xs font-black uppercase text-blue-500 mb-6">Hero Setup</h3>
            <div class="space-y-6">
                <select id="hero-select" class="input-dark bg-slate-950 w-full"></select>
                <div id="skill-inputs" class="space-y-4"></div>
                <button onclick="saveHeroConfig()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase tracking-widest">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { HEROES } from './data/heroes.js';
        import { initBridge } from './js/ui-bridge.js';
        
        // Pass heroes to bridge and start
        initBridge(HEROES);
    </script>
</body>
</html>
