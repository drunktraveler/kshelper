<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080a0f; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.4rem 0.75rem; width: 100%; outline: none; transition: all 0.2s; font-size: 0.9rem; text-align: center; }
        .f-bar { height: 8px; border-radius: 4px; overflow: hidden; display: flex; background: #1e293b; }
        .f-inf { background: #3b82f6; transition: width 0.4s; }
        .f-cav { background: #f59e0b; transition: width 0.4s; }
        .f-arc { background: #10b981; transition: width 0.4s; }
        .hero-circle { width: 36px; height: 36px; border-radius: 50%; border: 2px solid #1e293b; background: #0f172a; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: 800; color: #475569; transition: 0.2s; }
        .hero-circle.active { border-color: #3b82f6; background: #1e293b; color: white; }
        .hero-leader { border-color: rgba(245, 158, 11, 0.4); }
        .stat-row { grid-template-cols: 1fr 1.5fr 1fr; display: grid; align-items: center; padding: 0.5rem 1rem; border-radius: 0.75rem; transition: 0.2s; }
        .stat-row:hover { background: rgba(255,255,255,0.03); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<!-- Replace the body content of your index.html with this updated structure -->
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black text-blue-500 uppercase tracking-tighter">Kingshot Studio</h1>
            <div class="bg-slate-900 p-1 rounded-xl border border-slate-800 flex text-xs font-bold">
                <button class="px-4 py-2 bg-blue-600 rounded-lg uppercase">Battle</button>
                <button class="px-4 py-2 text-slate-500 uppercase">Formation</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- Attacker -->
            <div class="glass-card p-6 border-l-4 border-emerald-500/30">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">Attacker</span>
                    <div class="flex gap-2">
                        <select id="atk-tier" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 font-bold text-slate-400 outline-none"><option value="11">T11</option><option value="10" selected>T10</option></select>
                        <select id="atk-tg" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 font-bold text-slate-400 outline-none"><option value="5">TG5</option><option value="3" selected>TG3</option></select>
                    </div>
                </div>
                
                <!-- Count Inputs -->
                <div class="grid grid-cols-3 gap-3 mb-2">
                    <input type="number" id="atk-inf" oninput="window.syncTroops('atk', 'count')" class="input-dark font-bold text-blue-400" value="500000">
                    <input type="number" id="atk-cav" oninput="window.syncTroops('atk', 'count')" class="input-dark font-bold text-amber-400" value="200000">
                    <input type="number" id="atk-arc" oninput="window.syncTroops('atk', 'count')" class="input-dark font-bold text-emerald-400" value="300000">
                </div>
                <!-- Percentage Inputs -->
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="relative"><input type="number" id="atk-inf-p" oninput="window.syncTroops('atk', 'percent')" class="input-dark text-xs opacity-60" value="50"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                    <div class="relative"><input type="number" id="atk-cav-p" oninput="window.syncTroops('atk', 'percent')" class="input-dark text-xs opacity-60" value="20"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                    <div class="relative"><input type="number" id="atk-arc-p" oninput="window.syncTroops('atk', 'percent')" class="input-dark text-xs opacity-60" value="30"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                </div>

                <div class="f-bar mb-6" id="atk-f-bar"><div class="f-inf"></div><div class="f-cav"></div><div class="f-arc"></div></div>
                <div class="flex gap-2" id="atk-hero-grid"></div>
            </div>

            <!-- Defender (Fixed: Not Mirrored) -->
            <div class="glass-card p-6 border-r-4 border-red-500/30">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black uppercase text-red-500 tracking-widest">Defender</span>
                    <div class="flex gap-2">
                        <select id="def-tier" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 font-bold text-slate-400 outline-none"><option value="11">T11</option><option value="10" selected>T10</option></select>
                        <select id="def-tg" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 font-bold text-slate-400 outline-none"><option value="5">TG5</option><option value="3" selected>TG3</option></select>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-2">
                    <input type="number" id="def-inf" oninput="window.syncTroops('def', 'count')" class="input-dark font-bold text-blue-400" value="500000">
                    <input type="number" id="def-cav" oninput="window.syncTroops('def', 'count')" class="input-dark font-bold text-amber-400" value="200000">
                    <input type="number" id="def-arc" oninput="window.syncTroops('def', 'count')" class="input-dark font-bold text-emerald-400" value="300000">
                </div>
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div class="relative"><input type="number" id="def-inf-p" oninput="window.syncTroops('def', 'percent')" class="input-dark text-xs opacity-60" value="50"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                    <div class="relative"><input type="number" id="def-cav-p" oninput="window.syncTroops('def', 'percent')" class="input-dark text-xs opacity-60" value="20"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                    <div class="relative"><input type="number" id="def-arc-p" oninput="window.syncTroops('def', 'percent')" class="input-dark text-xs opacity-60" value="30"><span class="absolute right-2 top-2 text-[10px] text-slate-600">%</span></div>
                </div>

                <div class="f-bar mb-6" id="def-f-bar"><div class="f-inf"></div><div class="f-cav"></div><div class="f-arc"></div></div>
                <div class="flex gap-2" id="def-hero-grid"></div>
            </div>
        </div>

        <!-- Comparison Table (Slimmed Down) -->
        <div class="glass-card overflow-hidden mb-8 max-w-2xl mx-auto">
            <div class="grid grid-cols-3 bg-slate-900/80 py-2 px-6 border-b border-slate-800 text-[9px] font-black uppercase tracking-widest text-slate-500">
                <span>Atk %</span>
                <span class="text-center">Category</span>
                <span class="text-right">Def %</span>
            </div>
            <div id="stat-table" class="p-1 space-y-0.5"></div>
        </div>

        <button onclick="window.handleSimulation()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-sm">
            Run Simulation
        </button>

        <!-- NEW RESULT SECTION -->
        <div id="result-screen" class="hidden mt-12 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <div class="glass-card p-8 border-t-4 border-blue-500">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 class="text-2xl font-black uppercase tracking-tight">Battle Analysis</h2>
                        <p class="text-slate-500 text-xs font-bold" id="result-waves">Simulation ended after 0 waves</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-black uppercase text-slate-600 block">Victory probability</span>
                        <span class="text-3xl font-black text-blue-400">Average Case</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-12 mb-8">
                    <div class="space-y-4">
                        <p class="text-[10px] font-black uppercase text-emerald-500 tracking-widest border-b border-emerald-500/20 pb-1">Attacker Survivors</p>
                        <div class="text-4xl font-black" id="res-atk-total">0</div>
                        <div class="space-y-1 text-xs font-bold text-slate-400" id="res-atk-details"></div>
                    </div>
                    <div class="space-y-4">
                        <p class="text-[10px] font-black uppercase text-red-500 tracking-widest border-b border-red-500/20 pb-1 text-right">Defender Survivors</p>
                        <div class="text-4xl font-black text-right" id="res-def-total">0</div>
                        <div class="space-y-1 text-xs font-bold text-slate-400 text-right" id="res-def-details"></div>
                    </div>
                </div>

                <button onclick="window.toggleDetails()" class="text-[10px] font-black uppercase text-blue-500 hover:text-blue-400 transition tracking-widest">
                    View Full Combat Log +
                </button>
                <div id="battle-details" class="hidden mt-6 pt-6 border-t border-slate-800 font-mono text-[10px] text-slate-500 space-y-1 max-h-64 overflow-y-auto">
                    <!-- Logs go here -->
                </div>
            </div>
        </div>
    </div>
    <!-- (Modal stays as it is) -->
</body>

    <!-- Modal -->
    <div id="heroModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div id="modalContent" class="bg-slate-900 w-full max-w-xs rounded-3xl p-8 border border-slate-800 relative">
            <h3 id="modalTitle" class="text-xs font-black uppercase text-blue-500 mb-6 tracking-widest">Hero Config</h3>
            <div class="space-y-6">
                <select id="hero-select" class="input-dark bg-slate-950 w-full"></select>
                <div id="skill-inputs" class="space-y-4"></div>
                <button onclick="window.saveHeroConfig()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase tracking-widest text-xs">Update Lineup</button>
            </div>
        </div>
    </div>

    <script type="module" src="./ui-bridge.js"></script>
</body>
</html>
