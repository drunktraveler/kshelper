<!-- ... (Keep Head section with Tailwind and Inter Font) ... -->
<body class="p-4 md:p-8 bg-[#080a0f] text-slate-100">

    <div class="max-w-5xl mx-auto">
        <!-- ... (Navigation Bar same as before) ... -->

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            
            <!-- ATTACKER CARD -->
            <div class="glass-card p-6 flex flex-col justify-between border-l-4 border-l-emerald-500/30">
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-sm font-black uppercase tracking-widest text-emerald-500">Attacker Command</h2>
                        <div class="flex gap-2">
                            <!-- Tier Selector -->
                            <select id="atk-tier" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none">
                                <option value="11">T11</option><option value="10" selected>T10</option>
                                <option value="9">T9</option>
                            </select>
                            <!-- TG Selector -->
                            <select id="atk-tg" class="bg-slate-950 text-[10px] border border-slate-800 rounded px-2 py-1 uppercase font-bold text-slate-400 outline-none">
                                <option value="5">TG5</option><option value="4">TG4</option>
                                <option value="3" selected>TG3</option><option value="2">TG2</option>
                                <option value="1">TG1</option><option value="0">TG0</option>
                            </select>
                        </div>
                    </div>

                    <!-- Troop Inputs & Formation Bar (Same as before) -->
                    <!-- ... -->
                </div>

                <!-- Hero Grid (IDs added for JS) -->
                <div class="mt-6">
                    <p class="text-[9px] font-black text-slate-600 uppercase mb-3">Hero Skills (1-3 Leaders, 4-7 Joiners)</p>
                    <div class="flex gap-2" id="atk-hero-grid">
                        <!-- Filled by JS -->
                    </div>
                </div>
            </div>

            <!-- DEFENDER CARD (Mirror the Attacker Card changes) -->
            <!-- ... -->
        </div>

        <!-- ... (Stat Comparison Table same as before) ... -->
    </div>

    <!-- HERO CONFIG MODAL (Hidden by default) -->
    <div id="heroModal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div id="modalContent" class="bg-slate-900 w-full max-w-md rounded-3xl p-8 border border-slate-800 shadow-2xl relative">
            <button onclick="closeHeroModal()" class="absolute top-4 right-6 text-slate-500 hover:text-white text-xl">&times;</button>
            
            <h3 id="modalTitle" class="text-xs font-black uppercase text-slate-500 mb-6 tracking-widest">Configure Hero</h3>
            
            <div class="space-y-6">
                <!-- Hero Selector -->
                <div>
                    <label class="text-[10px] font-bold text-blue-500 uppercase block mb-2">Select Hero</label>
                    <select id="hero-select" class="input-dark bg-slate-950 w-full">
                        <option value="None">None</option>
                        <!-- Options generated from heroes.js -->
                    </select>
                </div>

                <!-- Skill Levels (Dynamic) -->
                <div id="skill-inputs" class="space-y-4">
                    <!-- JS will inject Skill 1, 2, 3 here based on Leader/Joiner -->
                </div>

                <button onclick="saveHeroConfig()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm uppercase tracking-widest mt-4 hover:bg-blue-500 transition-all">Apply to Lineup</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/ui-bridge.js"></script>
</body>
