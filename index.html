<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080a0f; color: #f8fafc; }
        .glass-card { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1.5rem; }
        .input-dark { background: rgba(2, 6, 23, 0.8); border: 1px solid #1e293b; border-radius: 0.75rem; padding: 0.5rem 0.75rem; width: 100%; outline: none; transition: all 0.2s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .stat-label { font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; text-align: center; }
        .val-higher { color: #10b981 !important; } /* Emerald-500 */
        .val-lower { color: #ef4444 !important; }  /* Red-500 */
        .val-neutral { color: #94a3b8; }           /* Slate-400 */
        
        /* Remove arrows from number inputs */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-500">KINGSHOT<span class="text-white font-light ml-2 uppercase tracking-widest text-sm">Studio</span></h1>
                <p class="text-xs text-slate-500 font-medium">Next-Gen Combat Simulation & Optimization</p>
            </div>
            <nav class="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                <button class="px-6 py-2 bg-blue-600 rounded-lg text-sm font-bold shadow-lg">Battle</button>
                <button class="px-6 py-2 text-slate-400 hover:text-white text-sm transition">Formation</button>
                <button class="px-6 py-2 text-slate-400 hover:text-white text-sm transition">Trap</button>
            </nav>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- ATTACKER COMMAND CARD -->
            <div class="glass-card p-6 border-l-4 border-l-emerald-500/50">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-lg font-bold text-emerald-400">Attacker Setup</h2>
                    <div class="flex gap-2">
                        <select class="bg-slate-950 text-xs border border-slate-700 rounded-md px-2 py-1 outline-none">
                            <option>Tier 11</option><option selected>Tier 10</option><option>Tier 9</option>
                        </select>
                        <select class="bg-slate-950 text-xs border border-slate-700 rounded-md px-2 py-1 outline-none">
                            <option>TG 5</option><option selected>TG 3</option><option>TG 0</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Infantry Count</label>
                        <input type="number" id="atk-inf-count" class="input-dark text-lg font-bold" value="500000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Cavalry Count</label>
                        <input type="number" id="atk-cav-count" class="input-dark text-lg font-bold" value="200000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Archer Count</label>
                        <input type="number" id="atk-arc-count" class="input-dark text-lg font-bold" value="300000">
                    </div>
                </div>
            </div>

            <!-- DEFENDER COMMAND CARD -->
            <div class="glass-card p-6 border-r-4 border-r-red-500/50">
                <div class="flex justify-between items-end mb-6">
                    <h2 class="text-lg font-bold text-red-400">Defender Setup</h2>
                    <div class="flex gap-2">
                        <select class="bg-slate-950 text-xs border border-slate-700 rounded-md px-2 py-1 outline-none">
                            <option>Tier 11</option><option selected>Tier 10</option><option>Tier 9</option>
                        </select>
                        <select class="bg-slate-950 text-xs border border-slate-700 rounded-md px-2 py-1 outline-none">
                            <option>TG 5</option><option selected>TG 3</option><option>TG 0</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Infantry Count</label>
                        <input type="number" id="def-inf-count" class="input-dark text-lg font-bold text-right" value="500000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Cavalry Count</label>
                        <input type="number" id="def-cav-count" class="input-dark text-lg font-bold text-right" value="200000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase ml-2">Archer Count</label>
                        <input type="number" id="def-arc-count" class="input-dark text-lg font-bold text-right" value="300000">
                    </div>
                </div>
            </div>

            <!-- STAT COMPARISON TABLE (Center-Spanning) -->
            <div class="lg:col-span-2 glass-card overflow-hidden">
                <div class="grid grid-cols-3 bg-slate-900/50 py-3 px-6 border-b border-slate-800">
                    <span class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">Atk Bonus</span>
                    <span class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest">Stat Category</span>
                    <span class="text-right text-[10px] font-black uppercase text-red-500 tracking-widest">Def Bonus</span>
                </div>

                <div class="p-4 space-y-1" id="stat-comparison-container">
                    <!-- This block is repeated for each stat in JavaScript -->
                    <div class="grid grid-cols-[1fr_2fr_1fr] items-center px-4 py-2 hover:bg-white/5 transition rounded-xl">
                        <input type="number" data-side="atk" data-stat="inf_att" class="bg-transparent text-sm font-black outline-none stat-input" value="1200">
                        <div class="stat-label">Infantry Attack</div>
                        <input type="number" data-side="def" data-stat="inf_att" class="bg-transparent text-sm font-black text-right outline-none stat-input" value="1000">
                    </div>
                    
                    <div class="grid grid-cols-[1fr_2fr_1fr] items-center px-4 py-2 hover:bg-white/5 transition rounded-xl border-t border-slate-800/30">
                        <input type="number" data-side="atk" data-stat="inf_def" class="bg-transparent text-sm font-black outline-none stat-input" value="900">
                        <div class="stat-label">Infantry Defense</div>
                        <input type="number" data-side="def" data-stat="inf_def" class="bg-transparent text-sm font-black text-right outline-none stat-input" value="1150">
                    </div>
                    <!-- ... more rows ... -->
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="mt-12 flex justify-center">
            <button class="group relative px-12 py-5 bg-blue-600 rounded-2xl font-black text-lg tracking-tight hover:bg-blue-500 transition-all shadow-2xl shadow-blue-900/40">
                RUN SIMULATION
                <div class="absolute inset-0 rounded-2xl border-2 border-white/10 group-hover:scale-105 transition-transform"></div>
            </button>
        </div>
    </div>

    <script>
        // Simple script to handle dynamic color logic
        function updateColors() {
            const container = document.getElementById('stat-comparison-container');
            const rows = container.querySelectorAll('.grid');

            rows.forEach(row => {
                const atkInput = row.querySelector('input[data-side="atk"]');
                const defInput = row.querySelector('input[data-side="def"]');
                
                const atkVal = parseFloat(atkInput.value);
                const defVal = parseFloat(defInput.value);

                if (atkVal > defVal) {
                    atkInput.className = atkInput.className.replace(/val-\w+/, '') + ' val-higher';
                    defInput.className = defInput.className.replace(/val-\w+/, '') + ' val-neutral';
                } else if (defVal > atkVal) {
                    defInput.className = defInput.className.replace(/val-\w+/, '') + ' val-lower';
                    atkInput.className = atkInput.className.replace(/val-\w+/, '') + ' val-neutral';
                } else {
                    atkInput.className = atkInput.className.replace(/val-\w+/, '') + ' val-neutral';
                    defInput.className = defInput.className.replace(/val-\w+/, '') + ' val-neutral';
                }
            });
        }

        // Listen for all input changes
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('stat-input')) {
                updateColors();
            }
        });

        // Initial run
        updateColors();
    </script>
</body>
</html>
