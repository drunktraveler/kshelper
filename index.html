<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Combat Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f1a; color: #f8fafc; }
        .glass-panel { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .input-focus:focus { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); border-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Sticky Navigation -->
    <nav class="max-w-4xl mx-auto mb-8 flex justify-between items-center bg-slate-900/80 p-4 rounded-2xl border border-slate-800 sticky top-4 z-50">
        <div class="font-black text-xl tracking-tighter text-blue-500">KINGSHOT<span class="text-slate-400 font-light ml-1 text-sm uppercase tracking-widest">Studio</span></div>
        <div class="flex gap-4">
            <button class="text-blue-400 font-bold border-b-2 border-blue-400 pb-1">Combat</button>
            <button class="text-slate-500 hover:text-white transition">Optimizer</button>
            <button class="text-slate-500 hover:text-white transition">Bear Trap</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto space-y-6">
        
        <!-- Troop Section (Screenshot 4 vibe but cleaner) -->
        <div class="glass-panel rounded-3xl p-6">
            <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
                <h2 class="text-sm font-black uppercase tracking-widest text-slate-500">Troop Deployment</h2>
                <div class="flex gap-2 text-xs">
                    <span class="bg-blue-600/20 text-blue-400 px-2 py-1 rounded">Rally Mode</span>
                </div>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- Inf, Cav, Arc Blocks -->
                <div class="space-y-4">
                    <label class="text-xs font-bold text-slate-400 uppercase">Infantry (T11)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-emerald-400 text-lg font-bold input-focus" placeholder="Atk Count">
                        <div class="h-4 w-px bg-slate-800"></div>
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-red-400 text-lg font-bold input-focus" placeholder="Def Count">
                    </div>
                </div>
                <!-- ... Repeat for Cav and Arc ... -->
                <div class="space-y-4">
                    <label class="text-xs font-bold text-slate-400 uppercase">Cavalry (T11)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-emerald-400 text-lg font-bold input-focus" placeholder="Atk Count">
                        <div class="h-4 w-px bg-slate-800"></div>
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-red-400 text-lg font-bold input-focus" placeholder="Def Count">
                    </div>
                </div>
                <div class="space-y-4">
                    <label class="text-xs font-bold text-slate-400 uppercase">Archers (T11)</label>
                    <div class="flex items-center gap-2">
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-emerald-400 text-lg font-bold input-focus" placeholder="Atk Count">
                        <div class="h-4 w-px bg-slate-800"></div>
                        <input type="number" class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-red-400 text-lg font-bold input-focus" placeholder="Def Count">
                    </div>
                </div>
            </div>
        </div>

        <!-- Comparison Table (Screenshot 1 & 4 hybrid) -->
        <div class="glass-panel rounded-3xl overflow-hidden shadow-2xl">
            <!-- Table Header -->
            <div class="grid grid-cols-[1fr_auto_1fr] bg-slate-800/50 p-4 border-b border-slate-700">
                <div class="text-center text-[10px] font-black uppercase text-emerald-400 tracking-widest">Attacker</div>
                <div class="text-center text-[10px] font-black uppercase text-slate-500 tracking-widest px-8">Stat Bonus</div>
                <div class="text-center text-[10px] font-black uppercase text-red-400 tracking-widest">Defender</div>
            </div>

            <!-- Stat Rows -->
            <div class="p-2 space-y-1">
                <!-- Example Row: Infantry Attack -->
                <div class="grid grid-cols-[1fr_auto_1fr] items-center p-3 rounded-xl hover:bg-white/5 transition group">
                    <input type="number" class="bg-transparent text-center text-xl font-black text-emerald-400 outline-none w-full" value="1200">
                    <div class="w-32 text-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Infantry Attack</span>
                    </div>
                    <input type="number" class="bg-transparent text-center text-xl font-black text-slate-600 outline-none w-full group-hover:text-red-400 transition" value="1000">
                </div>
                
                <!-- Repeat for other stats... -->
                <div class="grid grid-cols-[1fr_auto_1fr] items-center p-3 rounded-xl hover:bg-white/5 transition group border-t border-slate-800/50">
                    <input type="number" class="bg-transparent text-center text-xl font-black text-emerald-400 outline-none w-full" value="850">
                    <div class="w-32 text-center">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-tighter">Infantry Defense</span>
                    </div>
                    <input type="number" class="bg-transparent text-center text-xl font-black text-slate-600 outline-none w-full group-hover:text-red-400 transition" value="950">
                </div>
            </div>
        </div>
        
        <!-- Simulate Button -->
        <button class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-3xl shadow-xl shadow-blue-900/20 transition-all active:scale-[0.98]">
            RUN COMBAT SIMULATION
        </button>

    </div>
</body>
</html>
